    :root {
      --bg-1: #071024;
      --bg-2: #111a33;
      --card: rgba(10, 20, 40, 0.84);
      --border: #2a3653;
      --text: #edf4ff;
      --muted: #a7b7d6;
      --accent: #22d3ee;
      --accent-2: #f59e0b;
      --tag: rgba(34, 211, 238, 0.1);
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.32);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", "Segoe UI", "Trebuchet MS", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 0% 0%, rgba(245, 158, 11, 0.12), transparent 34%),
        radial-gradient(circle at 100% 8%, rgba(34, 211, 238, 0.14), transparent 30%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      line-height: 1.55;
    }

    .page {
      width: min(1080px, 94vw);
      margin: 26px auto 50px;
      display: grid;
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
    }

    .hero {
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(95deg, rgba(245, 158, 11, 0.1), transparent 40%, rgba(34, 211, 238, 0.12));
      pointer-events: none;
    }

    .hero-inner {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 16px;
    }

    .top-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .language-switch {
      display: inline-flex;
      gap: 8px;
      background: rgba(17, 26, 51, 0.72);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px;
    }

    .lang-btn {
      border: 0;
      border-radius: 999px;
      padding: 8px 14px;
      background: transparent;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
    }

    .lang-btn.active {
      background: var(--accent);
      color: #06243a;
    }

    .pdf-links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .action-link {
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      text-decoration: none;
      font-size: 0.88rem;
      padding: 8px 12px;
      background: rgba(7, 16, 36, 0.74);
      transition: border-color 0.2s ease, transform 0.2s ease;
    }

    .action-link:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .name {
      margin: 0;
      font-size: clamp(2rem, 6.5vw, 2.9rem);
      line-height: 1.06;
      letter-spacing: 0.02em;
    }

    .role-line {
      margin: 0;
      color: var(--accent);
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.02em;
    }

    .contact-line {
      margin: 0;
      color: var(--muted);
      display: flex;
      gap: 9px;
      flex-wrap: wrap;
      align-items: center;
      font-size: 0.95rem;
    }

    .contact-line a,
    .linkedin a,
    .reference-list a {
      color: #86e8ff;
      text-decoration: none;
    }

    .linkedin {
      margin: 0;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .full {
      grid-column: 1 / -1;
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 1.15rem;
      letter-spacing: 0.02em;
      color: #dff3ff;
    }

    .summary {
      margin: 0;
      color: var(--muted);
    }

    .entry-list {
      display: grid;
      gap: 14px;
    }

    .entry {
      border-left: 2px solid #304061;
      padding-left: 12px;
    }

    .entry-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
    }

    .entry-title {
      margin: 0;
      font-size: 1rem;
      line-height: 1.3;
    }

    .entry-location {
      color: var(--muted);
      font-size: 0.88rem;
    }

    .entry-meta {
      margin: 4px 0 2px;
      color: #d9e5ff;
      font-size: 0.94rem;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .entry-period {
      color: var(--accent-2);
      font-weight: 600;
      font-size: 0.9rem;
    }

    .entry-note {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 0.93rem;
    }

    .entry ul {
      margin: 6px 0 0;
      padding-left: 18px;
      color: var(--muted);
    }

    .entry li {
      margin: 3px 0;
    }

    .simple-list {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      display: grid;
      gap: 6px;
    }

    .skills-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 8px;
    }

    .skills-list li {
      border: 1px solid #2f3f61;
      background: var(--tag);
      border-radius: 10px;
      padding: 10px;
      color: var(--muted);
      font-size: 0.93rem;

    .skills-list strong {
      color: #eaf1ff;
    }

    .reference-hint {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .reference-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 8px;
    }

    .reference-list a {
      display: block;
      border: 1px solid #2f3f61;
      border-radius: 10px;
      padding: 10px 12px;
      background: rgba(7, 16, 36, 0.54);
      transition: border-color 0.2s ease;
    }

    .reference-list a:hover {
      border-color: var(--accent);
    }

    footer {
      text-align: center;
      color: #8da3ca;
      font-size: 0.86rem;
      padding: 2px 0 8px;
    }

    @media (min-width: 860px) {
      .layout {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

      }

      }

        margin-top: 2px;
      }

    function renderEntries(containerId, items) {
      const container = document.getElementById(containerId);
      container.innerHTML = "";

      items.forEach((item) => {
        const article = document.createElement("article");
        article.className = "entry";

        const head = document.createElement("div");
        head.className = "entry-head";

        const title = document.createElement("h3");
        title.className = "entry-title";
        title.textContent = item.title;

        head.append(title);

        if (item.location) {
          const location = document.createElement("span");
          location.className = "entry-location";
          location.textContent = item.location;
          head.append(location);
        }

        article.append(head);

        if (item.meta || item.period) {
          const meta = document.createElement("p");
          meta.className = "entry-meta";

          if (item.meta) {
            const metaText = document.createElement("span");
            metaText.textContent = item.meta;
            meta.append(metaText);
          }

          if (item.period) {
            const period = document.createElement("span");
            period.className = "entry-period";
            period.textContent = item.period;
            meta.append(period);
          }

          article.append(meta);
        }

        if (item.note) {
          const note = document.createElement("p");
          note.className = "entry-note";
          note.textContent = item.note;
          article.append(note);
        }

        if (Array.isArray(item.bullets) && item.bullets.length > 0) {
          const bulletList = document.createElement("ul");
          item.bullets.forEach((bullet) => {
            const li = document.createElement("li");
            li.textContent = bullet;
            bulletList.append(li);
          });
          article.append(bulletList);
        }

        container.append(article);
      });
    }

    function renderSimpleList(containerId, items) {
      const container = document.getElementById(containerId);
      container.innerHTML = "";
      items.forEach((item) => {
        const li = document.createElement("li");
        li.textContent = item;
        container.append(li);
      });
    }

    function renderSkills(items) {
      const container = document.getElementById("skills-list");
      container.innerHTML = "";

      items.forEach((item) => {
        const li = document.createElement("li");
        const label = document.createElement("strong");
        label.textContent = `${item.label}:`;
        li.append(label, document.createTextNode(` ${item.value}`));
        container.append(li);
      });
    }

    function renderReferences(items) {
      const container = document.getElementById("references-list");
      container.innerHTML = "";

      items.forEach((item) => {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.href = item.href;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.textContent = item.label;
        li.append(a);
        container.append(li);
      });
    }

    function setLanguage(language) {
      const lang = cvData[language] ? language : "de";
      const content = cvData[lang];

      document.documentElement.lang = lang;
      document.title = content.pageTitle;

      document.getElementById("role-line").textContent = content.roleLine;
      document.getElementById("location-text").textContent = content.location;
      document.getElementById("summary-text").textContent = content.summary;
      document.getElementById("references-hint").textContent = content.referencesHint;
      document.getElementById("pdf-de").textContent = content.downloadDe;
      document.getElementById("pdf-en").textContent = content.downloadEn;
      document.getElementById("footer-text").textContent = content.footer;

      Object.entries(content.sectionTitles).forEach(([key, value]) => {
        sectionTitleNodes[key].textContent = value;
      });

      renderEntries("education-list", content.education);
      renderEntries("experience-list", content.experience);
      renderEntries("projects-list", content.projects);
      renderEntries("academic-list", content.academic);
      renderSimpleList("certifications-list", content.certifications);
      renderSkills(content.skills);
      renderReferences(content.references);

      document.querySelectorAll(".lang-btn").forEach((button) => {
        const active = button.dataset.lang === lang;
        button.classList.toggle("active", active);
        button.setAttribute("aria-pressed", String(active));
      });

      localStorage.setItem("cv-language", lang);
    }

    document.querySelectorAll(".lang-btn").forEach((button) => {
      button.addEventListener("click", () => setLanguage(button.dataset.lang));
    });

    setLanguage(localStorage.getItem("cv-language") || "de");
  </script>
</body>
</html>
